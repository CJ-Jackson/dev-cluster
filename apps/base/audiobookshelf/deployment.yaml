apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.35.1
          ports:
            - containerPort: 3005
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false

          volumeMounts:
            - mountPath: /config
              name: audiobookshelf-data
              subPath: config/
            - mountPath: /metadata
              name: audiobookshelf-data
              subPath: metadata/
            - mountPath: /audiobooks 
              name: audiobookshelf-data
              subPath: audiobooks/
            - mountPath: /podcasts
              name: audiobookshelf-data
              subPath: podcasts/

          envFrom:
            - configMapRef:
                name: env-config

      volumes:
      - name: audiobookshelf-data
        persistentVolumeClaim:
          claimName: audiobookshelf-data-pvc
