apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "41.0.1"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Deployment configuration
    deployment:
      # Run 3 replicas for high availability
      replicas: 3

    # Resource allocation
    resources:
      requests:
        cpu: 200m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi

    # Entrypoints configuration
    ports:
      # HTTP entrypoint
      web:
        port: 8000
        exposedPort: 80
        protocol: TCP
        # Redirect HTTP to HTTPS
        # http:
        #   redirections:
        #     entryPoint:
        #       to: websecure
        #       scheme: https
        #       priority: 10
        transport:
          lifeCycle:
            graceTimeOut: 30s

      # HTTPS entrypoint
      websecure:
        port: 8443
        exposedPort: 443
        protocol: TCP
        http:
          tls:
            enabled: true
        transport:
          lifeCycle:
            graceTimeOut: 30s

      # Metrics entrypoint
      metrics:
        port: 9100
        exposedPort: 9100
        protocol: TCP

      # PostgreSQL TCP entrypoint
      # postgres:
      #   port: 5432
      #   exposedPort: 5432
      #   protocol: TCP
      #   expose:
      #     default: true

    # Service configuration
    service:
      type: LoadBalancer
      annotations:
        # AWS NLB annotations
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

    # Enable Traefik dashboard
    # ingressRoute:
    #   dashboard:
    #     enabled: true
    #     matchRule: Host(`traefik.internal.example.com`)
    #     entryPoints:
    #       - websecure

    # Providers configuration
    providers:
      # Enable Kubernetes CRD provider
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
        allowExternalNameServices: true
      # Enable Kubernetes Ingress provider
      kubernetesIngress:
        enabled: true
        allowExternalNameServices: true

    # Logging configuration
    logs:
      general:
        level: INFO
      access:
        enabled: true
        format: json
        fields:
          general:
            defaultmode: keep
          headers:
            defaultmode: drop
            names:
              User-Agent: keep
              Content-Type: keep

    # Metrics configuration
    metrics:
      prometheus:
        entryPoint: metrics
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        service:
          enabled: true
        serviceMonitor:
          enabled: false

    # Pod disruption budget
    podDisruptionBudget:
      enabled: true
      minAvailable: 2

    # Affinity and topology
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - traefik
              topologyKey: kubernetes.io/hostname

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik

    # Additional arguments
    additionalArguments:
      # Enable access log buffering
      - "--accesslog.bufferingsize=100"
